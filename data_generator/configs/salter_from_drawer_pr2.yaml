## all relative paths in this file have pybullet_planning as the root dir

## debug related
seed: None
verbose: true

## data collection mode
parallel: false
n_data: 1


## pybullet related
sim:
  viewer: true
  lock: true
  simulate: false
  drive: true
  time_step: 0.02
  camera: true
  segment: false
  monitoring: false
  skip_prompt: false


robot:
  robot_name: 'pr2'
  builder_name: 'build_robot_from_args'
  builder_kwargs:
    ## x, y, z joint limits for base motion planning (covers 6x6 floor)
    custom_limits: [[0, 0, 0], [6, 6, 2]]
    initial_xy: [3, 3]
    ## robot spawns in front of the two drawer cabinets and destination counter
    spawn_range: [[2, 1, 0.5], [4, 5, 1.9]]


world:
  builder_name: 'test_salter_from_drawer'
  builder_kwargs:
    verbose: true


data:
  out_dir: '../outputs/salter_from_drawer_pr2/'
  save_failed_plans: true
  save_log: true
  save_commands: true
  images:
    save_rgb: true
    save_depth: false
  resolution: [1280, 720]
  fx: 800
  cameras:
    ## overview from in front of the scene
    front: [[6.5, 3, 2.0], [0.5, 0.5, -0.5, -0.5]]
    top: [[3, -1, 4], [3, 3, 0]]


## configuration for PDDLStream
planner:
  visualize: false
  timeout: 300
  domain_pddl: 'pddl_domains/pr2_domain_pigi.pddl'
  stream_pddl:  'pddl_domains/pr2_stream_pigi.pddl'
  downward_time: 1
  diverse: false
  dataset: false


## planning stream related
streams:
  debug: false
  cfree: false
  teleport: true
  movable_collisions: true
  base_collisions: true
  top_grasp_tolerance: 0.8
  ir_max_attempts: 15
  use_all_grasps: false
